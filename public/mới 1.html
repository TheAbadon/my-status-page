<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground - Light Mode Click Rực Rỡ</title>
    <style>
        :root {
            --bg-light: #f0f2f5;
            --bg-dark: #111827;
            --toggle-size: 60px;
            --transition-speed: 0.8s;
            --star-count: 6;
            --particle-count: 100;
            --star-speed: 4;
            --sun-color: #facc15;
            --moon-color: #cbd5e1;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            transition: background var(--transition-speed) ease-in-out, color var(--transition-speed) ease-in-out;
            background: var(--bg-light);
            color: #1a1a2e;
            overflow: hidden;
            position: relative;
            user-select: none;
        }
        body.dark {
            background: var(--bg-dark);
            color: #f9fafb;
        }

        #particleCanvas, #starfield, #clickEffectCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        #clickEffectCanvas { z-index: 150; }
        #starfield { display: none; }
        body.dark #starfield { display: block; }
        body.dark #particleCanvas { display: none; }

        .dark-toggle {
            position: fixed;
            top: 20px; right: 20px;
            width: var(--toggle-size);
            height: var(--toggle-size);
            background: var(--sun-color);
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.8);
            cursor: pointer;
            z-index: 200;
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body.dark .dark-toggle {
            background: var(--moon-color);
            box-shadow: 0 0 35px rgba(147, 197, 253, 0.9);
        }
        .dark-toggle .rays {
            position: absolute;
            width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent 0deg, transparent 10deg, rgba(255,255,255,0.4) 10deg, rgba(255,255,255,0.4) 20deg);
            mask: radial-gradient(farthest-side, transparent 70%, black 71%);
            animation: spinRays 12s linear infinite;
        }
        body.dark .dark-toggle .rays { display: none; }
        body.dark .dark-toggle::after {
            content: '';
            position: absolute;
            width: calc(var(--toggle-size) * 0.8);
            height: calc(var(--toggle-size) * 0.8);
            background: var(--bg-dark);
            border-radius: 50%;
            top: 10%;
            left: 30%;
            box-shadow: 0 0 8px var(--bg-dark);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes spinRays { to { transform: rotate(360deg); } }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            z-index: 200;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-height: 35vh;
            overflow-y: auto;
        }
        body.dark .controls {
            background: rgba(31, 41, 55, 0.9);
            color: white;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label {
            font-weight: 600; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        input[type="range"] { width: 100%; cursor: pointer; }
        button {
            padding: 8px 16px; border-radius: 10px; border: none;
            background: #4f46e5; color: white; font-weight: 600;
            cursor: pointer; transition: 0.2s; margin-top: 5px;
        }
        button:hover { background: #4338ca; }
        .value-display { font-size: 0.9rem; margin-left: 8px; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <canvas id="starfield"></canvas>
    <canvas id="clickEffectCanvas"></canvas>

    <div class="dark-toggle" id="darkToggle" title="Chuyển chế độ">
        <div class="rays"></div>
    </div>

    <div class="controls" id="controls">
        <div class="control-group">
            <label>🌓 Transition nền (giây): <span id="bgSpeedVal">0.8</span></label>
            <input type="range" id="bgSpeed" min="0.1" max="6" step="0.1" value="0.8">
        </div>
        <div class="control-group">
            <label>🔘 Transition nút (giây): <span id="toggleSpeedVal">0.8</span></label>
            <input type="range" id="toggleSpeed" min="0.1" max="4" step="0.1" value="0.8">
        </div>
        <div class="control-group">
            <label>⭐ Số sao băng: <span id="starCountVal">6</span></label>
            <input type="range" id="starCount" min="1" max="20" step="1" value="6">
        </div>
        <div class="control-group">
            <label>💫 Tốc độ sao băng: <span id="starSpeedVal">4</span></label>
            <input type="range" id="starSpeed" min="1" max="15" step="0.5" value="4">
        </div>
        <div class="control-group">
            <label>✨ Số hạt bụi (light): <span id="particleCountVal">100</span></label>
            <input type="range" id="particleCount" min="5" max="150" step="5" value="100">
        </div>
        <div class="control-group">
            <label>🖱️ Kích thước Click FX: <span id="fxSizeVal">60</span></label>
            <input type="range" id="fxSize" min="20" max="150" step="5" value="60">
        </div>
        <div>
            <button onclick="resetDefaults()">↺ Mặc định</button>
        </div>
        <div>
            <button onclick="toggleDark()">🌓 Đổi chế độ</button>
        </div>
    </div>

    <script>
        (function() {
            const body = document.body;
            const darkToggle = document.getElementById('darkToggle');
            
            const starCanvas = document.getElementById('starfield');
            const particleCanvas = document.getElementById('particleCanvas');
            const clickCanvas = document.getElementById('clickEffectCanvas');
            const sCtx = starCanvas.getContext('2d');
            const pCtx = particleCanvas.getContext('2d');
            const cCtx = clickCanvas.getContext('2d');
            
            let stars = [], particles = [], clickEffects = [];
            let starAnimId, particleAnimId, clickAnimId;

            const bgSpeedInput = document.getElementById('bgSpeed');
            const toggleSpeedInput = document.getElementById('toggleSpeed');
            const starCountInput = document.getElementById('starCount');
            const starSpeedInput = document.getElementById('starSpeed');
            const particleCountInput = document.getElementById('particleCount');
            const fxSizeInput = document.getElementById('fxSize');

            function updateUI() {
                document.getElementById('bgSpeedVal').textContent = bgSpeedInput.value;
                document.getElementById('toggleSpeedVal').textContent = toggleSpeedInput.value;
                document.getElementById('starCountVal').textContent = starCountInput.value;
                document.getElementById('starSpeedVal').textContent = starSpeedInput.value;
                document.getElementById('particleCountVal').textContent = particleCountInput.value;
                document.getElementById('fxSizeVal').textContent = fxSizeInput.value;
                document.documentElement.style.setProperty('--transition-speed', bgSpeedInput.value + 's');
                darkToggle.style.transition = `all ${toggleSpeedInput.value}s cubic-bezier(0.4, 0, 0.2, 1)`;
                body.style.transition = `background ${bgSpeedInput.value}s ease-in-out, color ${bgSpeedInput.value}s ease-in-out`;
                if (stars.length !== +starCountInput.value) initStars(+starCountInput.value);
                if (particles.length !== +particleCountInput.value) initParticles(+particleCountInput.value);
            }

            bgSpeedInput.addEventListener('input', updateUI);
            toggleSpeedInput.addEventListener('input', updateUI);
            starCountInput.addEventListener('input', updateUI);
            starSpeedInput.addEventListener('input', updateUI);
            particleCountInput.addEventListener('input', updateUI);
            fxSizeInput.addEventListener('input', updateUI);

            function toggleDark() { body.classList.toggle('dark'); }
            darkToggle.addEventListener('click', toggleDark);

            function resizeCanvases() {
                const w = window.innerWidth, h = window.innerHeight;
                starCanvas.width = particleCanvas.width = clickCanvas.width = w;
                starCanvas.height = particleCanvas.height = clickCanvas.height = h;
            }
            window.addEventListener('resize', resizeCanvases);
            resizeCanvases();

            // ==================== SAO BĂNG & HẠT BỤI ====================
            class ShootingStar {
                constructor() { this.reset(true); }
                reset(initial = false) {
                    if (Math.random() < 0.5) { this.x = Math.random() * starCanvas.width; this.y = -20; }
                    else { this.x = -20; this.y = Math.random() * starCanvas.height * 0.5; }
                    this.len = Math.random() * 140 + 80;
                    this.speed = +starSpeedInput.value + Math.random() * 5;
                    this.opacity = Math.random() * 0.6 + 0.6;
                    this.angle = 25 + Math.random() * 25;
                    this.curve = (Math.random() - 0.5) * 0.8;
                    this.time = 0;
                    if (initial) { this.x = Math.random() * starCanvas.width; this.y = Math.random() * starCanvas.height * 0.6; }
                }
                update() {
                    this.time += 0.02;
                    let rad = (this.angle + Math.sin(this.time) * this.curve) * Math.PI / 180;
                    this.x += this.speed * Math.cos(rad);
                    this.y += this.speed * Math.sin(rad);
                    if (this.x > starCanvas.width + 120 || this.y > starCanvas.height + 120 || this.x < -120) this.reset();
                }
                draw(ctx) {
                    let rad = (this.angle + Math.sin(this.time) * this.curve) * Math.PI / 180;
                    const endX = this.x - this.len * Math.cos(rad);
                    const endY = this.y - this.len * Math.sin(rad);
                    const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                    gradient.addColorStop(0.2, `rgba(255, 255, 240, ${this.opacity * 0.9})`);
                    gradient.addColorStop(0.6, `rgba(200, 220, 255, ${this.opacity * 0.4})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = gradient; ctx.lineWidth = 3.5;
                    ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 14; ctx.stroke(); ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 3.5, 0, Math.PI*2);
                    const headGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 3.5);
                    headGradient.addColorStop(0, 'white'); headGradient.addColorStop(0.5, 'rgba(255, 255, 200, 0.9)'); headGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = headGradient; ctx.shadowColor = 'white'; ctx.shadowBlur = 18; ctx.fill(); ctx.shadowBlur = 0;
                    for (let i = 0; i < 3; i++) {
                        const sparkX = this.x + (Math.random() - 0.5) * 20, sparkY = this.y + (Math.random() - 0.5) * 20;
                        ctx.beginPath(); ctx.arc(sparkX, sparkY, Math.random() * 1.5 + 0.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.7 + 0.3})`; ctx.fill();
                    }
                }
            }
            function initStars(count) { stars = []; for (let i=0; i<count; i++) stars.push(new ShootingStar()); }
            function animateStars() {
                if (!body.classList.contains('dark')) { sCtx.clearRect(0,0,starCanvas.width,starCanvas.height); starAnimId=requestAnimationFrame(animateStars); return; }
                sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
                stars.forEach(s => { s.update(); s.draw(sCtx); });
                starAnimId=requestAnimationFrame(animateStars);
            }

            class Particle {
                constructor() { this.x=Math.random()*particleCanvas.width; this.y=Math.random()*particleCanvas.height; this.size=Math.random()*3+1; this.speedX=(Math.random()-0.5)*0.4; this.speedY=(Math.random()-0.5)*0.4; this.opacity=Math.random()*0.6+0.2; }
                update() { this.x+=this.speedX; this.y+=this.speedY; if(this.x<0||this.x>particleCanvas.width) this.speedX*=-1; if(this.y<0||this.y>particleCanvas.height) this.speedY*=-1; }
                draw(ctx) { ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle=`rgba(250,204,21,${this.opacity})`; ctx.shadowColor='rgba(250,204,21,0.8)'; ctx.shadowBlur=4; ctx.fill(); ctx.shadowBlur=0; }
            }
            function initParticles(count) { particles=[]; for(let i=0;i<count;i++) particles.push(new Particle()); }
            function animateParticles() {
                if(body.classList.contains('dark')) { pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height); particleAnimId=requestAnimationFrame(animateParticles); return; }
                pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
                particles.forEach(p => { p.update(); p.draw(pCtx); });
                particleAnimId=requestAnimationFrame(animateParticles);
            }

            // ==================== HIỆU ỨNG CLICK NÂNG CẤP ====================
            class ClickEffect {
                constructor(x, y, type, size) {
                    this.x = x;
                    this.y = y;
                    this.type = type; // 'glow' cho light, 'darkGlow' cho dark
                    this.maxRadius = size * 1.0; // tăng kích thước tối đa
                    this.currentRadius = 0;
                    this.life = 1.0;
                    this.decay = 0.025; // chậm hơn một chút
                    this.particles = [];
                    this.sparks = [];

                    if (type === 'glow') {
                        // Nhiều tia lửa hơn, màu nóng rực rỡ
                        const sparkCount = 25 + Math.floor(Math.random() * 15);
                        for (let i = 0; i < sparkCount; i++) {
                            let angle = Math.random() * Math.PI * 2;
                            let speed = Math.random() * 5 + 1.5;
                            this.sparks.push({
                                x: 0, y: 0,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size: Math.random() * 3 + 1,
                                life: 1.0,
                                decay: Math.random() * 0.03 + 0.02,
                                hue: Math.random() * 35 + 25 // vàng -> cam (25-60)
                            });
                        }
                        // Thêm các hạt sáng trắng/vàng nhỏ bay ra
                        for (let i = 0; i < 20; i++) {
                            let angle = Math.random() * Math.PI * 2;
                            let speed = Math.random() * 3 + 0.5;
                            this.particles.push({
                                x: 0, y: 0,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size: Math.random() * 2 + 0.5,
                                life: 1.0,
                                decay: Math.random() * 0.04 + 0.02
                            });
                        }
                    } else if (type === 'darkGlow') {
                        for (let i = 0; i < 20; i++) {
                            let angle = Math.random() * Math.PI * 2;
                            let speed = Math.random() * 3 + 1;
                            this.particles.push({
                                x: 0, y: 0,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                size: Math.random() * 2 + 0.5,
                                life: 1.0,
                                decay: Math.random() * 0.02 + 0.02
                            });
                        }
                    }
                }

                update() {
                    this.life -= this.decay;
                    this.currentRadius = this.maxRadius * (1 - this.life);
                    
                    this.sparks.forEach(s => {
                        s.x += s.vx;
                        s.y += s.vy;
                        s.life -= s.decay;
                    });

                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;
                    });
                }

                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);

                    if (this.type === 'glow') {
                        // --- LIGHT MODE: bùng nổ ánh sáng ---
                        // Vòng sáng chính mạnh mẽ hơn
                        ctx.beginPath();
                        ctx.arc(0, 0, this.currentRadius, 0, Math.PI*2);
                        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.currentRadius);
                        gradient.addColorStop(0, `rgba(255, 255, 255, ${this.life * 1})`);
                        gradient.addColorStop(0.2, `rgba(255, 240, 150, ${this.life * 0.9})`);
                        gradient.addColorStop(0.6, `rgba(255, 150, 0, ${this.life * 0.5})`);
                        gradient.addColorStop(1, `rgba(255, 50, 0, 0)`);
                        ctx.fillStyle = gradient;
                        ctx.fill();

                        // Vòng viền sáng dày hơn
                        ctx.beginPath();
                        ctx.arc(0, 0, this.currentRadius, 0, Math.PI*2);
                        ctx.strokeStyle = `rgba(255, 255, 200, ${this.life * 1})`;
                        ctx.lineWidth = 4;
                        ctx.shadowColor = 'white';
                        ctx.shadowBlur = 15;
                        ctx.stroke();
                        ctx.shadowBlur = 0;

                        // Vẽ các tia lửa (sparks) rực rỡ
                        this.sparks.forEach(s => {
                            if (s.life <= 0) return;
                            ctx.beginPath();
                            ctx.moveTo(s.x, s.y);
                            const angle = Math.atan2(s.vy, s.vx);
                            const tailX = s.x - Math.cos(angle) * 10 * s.life;
                            const tailY = s.y - Math.sin(angle) * 10 * s.life;
                            ctx.lineTo(tailX, tailY);
                            ctx.strokeStyle = `hsla(${s.hue}, 100%, 65%, ${s.life})`;
                            ctx.lineWidth = 2.5;
                            ctx.shadowColor = `hsla(${s.hue}, 100%, 65%, 0.9)`;
                            ctx.shadowBlur = 8;
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        });

                        // Vẽ các hạt sáng
                        this.particles.forEach(p => {
                            if (p.life <= 0) return;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                            ctx.shadowColor = 'white';
                            ctx.shadowBlur = 6;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        });

                    } else if (this.type === 'darkGlow') {
                        // Dark mode giữ nguyên
                        ctx.beginPath();
                        ctx.arc(0, 0, this.currentRadius, 0, Math.PI*2);
                        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.currentRadius);
                        gradient.addColorStop(0, `rgba(130, 180, 255, ${this.life * 0.9})`);
                        gradient.addColorStop(0.4, `rgba(80, 100, 255, ${this.life * 0.5})`);
                        gradient.addColorStop(1, `rgba(20, 30, 80, 0)`);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(0, 0, this.currentRadius, 0, Math.PI*2);
                        ctx.strokeStyle = `rgba(200, 220, 255, ${this.life * 0.7})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        this.particles.forEach(p => {
                            if (p.life <= 0) return;
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                            ctx.fillStyle = `rgba(200, 220, 255, ${p.life})`;
                            ctx.shadowColor = '#aaccff';
                            ctx.shadowBlur = 6;
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        });
                    }
                    ctx.restore();
                }
            }

            body.addEventListener('click', (e) => {
                const x = e.clientX;
                const y = e.clientY;
                const size = +fxSizeInput.value;
                if (body.classList.contains('dark')) {
                    clickEffects.push(new ClickEffect(x, y, 'darkGlow', size));
                } else {
                    clickEffects.push(new ClickEffect(x, y, 'glow', size));
                }
            });

            function animateClickEffects() {
                cCtx.clearRect(0, 0, clickCanvas.width, clickCanvas.height);
                clickEffects = clickEffects.filter(e => e.life > 0);
                clickEffects.forEach(e => { e.update(); e.draw(cCtx); });
                clickAnimId = requestAnimationFrame(animateClickEffects);
            }

            function resetDefaults() {
                bgSpeedInput.value = 0.8;
                toggleSpeedInput.value = 0.8;
                starCountInput.value = 6;
                starSpeedInput.value = 4;
                particleCountInput.value = 100;
                fxSizeInput.value = 60;
                updateUI();
                initStars(6);
                initParticles(100);
            }

            initStars(6);
            initParticles(100);
            animateStars();
            animateParticles();
            animateClickEffects();
            updateUI();

            window.toggleDark = toggleDark;
            window.resetDefaults = resetDefaults;
        })();
    </script>
</body>
</html>
