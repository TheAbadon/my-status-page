<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạng thái của tôi</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --sub: #555;
            --accent: #4f46e5;
            --accent2: #7c3aed;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --border: #e5e7eb;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --radius: 20px;
            --info-bg: #f9fafb;
            --info-hover: #f3f4f6;
        }

        body.dark {
            --bg: #111827;
            --card: #1f2937;
            --text: #f9fafb;
            --sub: #9ca3af;
            --border: #374151;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --info-bg: #374151;
            --info-hover: #4b5563;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
            background-image: radial-gradient(ellipse at top, #e0e7ff 0%, var(--bg) 60%);
        }
        body.dark {
            background-image: radial-gradient(ellipse at top, #1e1b4b 0%, var(--bg) 60%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: white;
            font-weight: 700;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }
        .title-role {
            font-size: 0.9rem;
            color: var(--sub);
            margin-bottom: 16px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }
        .status-badge.busy {
            background: #fef2f2;
            color: var(--red);
            border: 1.5px solid #fecaca;
        }
        .status-badge.free {
            background: #ecfdf5;
            color: var(--green);
            border: 1.5px solid #a7f3d0;
        }
        .status-badge.away {
            background: #fffbeb;
            color: #d97706;
            border: 1.5px solid #fde68a;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }
        .busy .status-dot { background: var(--red); }
        .free .status-dot { background: var(--green); }
        .away .status-dot { background: #f59e0b; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .info-grid {
            display: grid;
            gap: 12px;
            text-align: left;
            margin-top: 4px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--info-bg);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .info-item:hover { background: var(--info-hover); }
        .info-icon {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }
        .info-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-weight: 600;
            color: var(--text);
            word-break: break-word;
        }
        .info-value a {
            color: var(--accent);
            text-decoration: none;
        }
        .info-value a:hover { text-decoration: underline; }

        .last-updated {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 16px;
        }

        .admin-link {
            display: block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #bbb;
            text-decoration: none;
            transition: 0.2s;
        }
        .admin-link:hover { color: #888; }

        .dark-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: var(--shadow);
            transition: 0.2s;
            z-index: 10;
        }
        .dark-toggle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 400px) {
            .card { padding: 24px 16px; }
            .name { font-size: 1.3rem; }
            .dark-toggle { top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <div class="dark-toggle" id="darkToggle" title="Chuyển chế độ tối/sáng">🌙</div>

    <div class="container">
        <div class="card">
            <div class="avatar" id="avatarContainer">
                <span id="avatarInitial">?</span>
                <img id="avatarImg" src="" alt="" style="display:none;">
            </div>
            <div class="name" id="displayName">Đang tải...</div>
            <div class="title-role" id="displayRole"></div>

            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">---</span>
            </div>

            <div class="info-grid" id="infoGrid"></div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>
        <a href="/admin" class="admin-link">⚙️ Quản trị</a>
    </div>

    <script>
        const API_BASE = '/api/status';

        // Dark mode
        const darkToggle = document.getElementById('darkToggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (localStorage.getItem('darkMode') === 'enabled' || (!localStorage.getItem('darkMode') && prefersDark)) {
            document.body.classList.add('dark');
            darkToggle.textContent = '☀️';
        }
        darkToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            if (document.body.classList.contains('dark')) {
                localStorage.setItem('darkMode', 'enabled');
                darkToggle.textContent = '☀️';
            } else {
                localStorage.setItem('darkMode', 'disabled');
                darkToggle.textContent = '🌙';
            }
        });

        function calculateAge(birthday) {
            if (!birthday) return null;
            const birthDate = new Date(birthday);
            if (isNaN(birthDate.getTime())) return null;
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        async function loadStatus() {
            try {
                const res = await fetch(API_BASE);
                if (!res.ok) throw new Error('Không thể tải dữ liệu');
                const data = await res.json();
                renderStatus(data);
            } catch (err) {
                console.error(err);
                document.querySelector('.card').innerHTML = 
                    '<p style="padding:40px;color:#999;">⚠️ Không thể kết nối đến máy chủ.<br>Vui lòng thử lại sau.</p>';
            }
        }

        function renderStatus(data) {
            // Avatar
            const avatarContainer = document.getElementById('avatarContainer');
            const avatarInitial = document.getElementById('avatarInitial');
            const avatarImg = document.getElementById('avatarImg');
            const initials = (data.name || '?').charAt(0).toUpperCase();

            // Tìm field avatar
            const avatarField = (data.fields || []).find(f => f.key === 'avatar' && f.value);
            if (avatarField) {
                avatarImg.src = avatarField.value;
                avatarImg.style.display = 'block';
                avatarInitial.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarInitial.style.display = 'block';
                avatarInitial.textContent = initials;
            }

            // Tên & vai trò
            document.getElementById('displayName').textContent = data.name || 'Ẩn danh';
            document.getElementById('displayRole').textContent = data.role || '';

            // Trạng thái
            const badge = document.getElementById('statusBadge');
            const statusText = document.getElementById('statusText');
            const status = data.status || 'free';
            badge.className = 'status-badge ' + status;
            const statusMap = { busy: '🔴 Đang bận', free: '🟢 Rảnh rỗi', away: '🟡 Tạm vắng' };
            statusText.textContent = statusMap[status] || status;

            // Thông tin chi tiết
            const grid = document.getElementById('infoGrid');
            grid.innerHTML = '';

            const fields = data.fields || [];
            const iconMap = {
                age: '🎂', phone: '📱', email: '📧', location: '📍',
                website: '🌐', github: '💻', facebook: '👤', zalo: '💬',
                telegram: '✈️', linkedin: '💼', instagram: '📷', twitter: '🐦',
                birthday: '🎈', avatar: '🖼️', default: '📌'
            };

            fields.forEach(field => {
                if (!field.value || field.value.trim() === '') return;
                // Ẩn avatar field khỏi danh sách text vì đã hiển thị ở avatar
                if (field.key === 'avatar') return;

                const icon = iconMap[field.key] || iconMap['default'];
                let displayValue = field.value;
                let displayLabel = field.label;

                // Xử lý birthday: tính tuổi và hiển thị
                if (field.key === 'birthday') {
                    const age = calculateAge(field.value);
                    if (age !== null) {
                        displayValue = `${field.value} (${age} tuổi)`;
                    }
                }

                const div = document.createElement('div');
                div.className = 'info-item';
                div.innerHTML = `
                    <span class="info-icon">${icon}</span>
                    <div>
                        <div class="info-label">${displayLabel}</div>
                        <div class="info-value">${formatValue(field.key, displayValue)}</div>
                    </div>
                `;
                grid.appendChild(div);
            });

            // Thời gian cập nhật
            const updated = data.updatedAt ? new Date(data.updatedAt) : null;
            document.getElementById('lastUpdated').textContent = updated 
                ? 'Cập nhật lần cuối: ' + updated.toLocaleString('vi-VN')
                : '';
        }

        function formatValue(key, value) {
            if (key === 'email') return `<a href="mailto:${value}">${value}</a>`;
            if (key === 'website') return `<a href="${value}" target="_blank">${value}</a>`;
            if (['github','facebook','linkedin','instagram','twitter'].includes(key)) {
                return `<a href="${value}" target="_blank">${value}</a>`;
            }
            return value;
        }

        // Load ngay khi trang mở
        loadStatus();
        // Tự động refresh mỗi 30 giây
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
