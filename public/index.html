<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạng thái của tôi</title>
    <meta property="og:title" content="Trạng thái của tôi" id="ogTitle">
    <meta property="og:description" content="" id="ogDesc">
    <meta property="og:image" content="" id="ogImage">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg: #f0f2f5; --card: #ffffff; --text: #1a1a2e; --sub: #555;
            --accent: #4f46e5; --accent2: #7c3aed; --green: #10b981; --red: #ef4444;
            --yellow: #f59e0b; --border: #e5e7eb; --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --radius: 20px; --info-bg: #f9fafb; --info-hover: #f3f4f6;
            --toggle-bg: #facc15; --toggle-shadow: rgba(250,204,21,0.8); --transition-speed: 0.1s;
        }
        body.dark {
            --bg: #111827; --card: #1f2937; --text: #f9fafb; --sub: #9ca3af;
            --border: #374151; --shadow: 0 4px 24px rgba(0,0,0,0.3); --info-bg: #374151;
            --info-hover: #4b5563; --toggle-bg: #cbd5e1; --toggle-shadow: rgba(147,197,253,0.9);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg);
            display:flex; justify-content:center; align-items:center; min-height:100vh;
            padding:20px; transition: background var(--transition-speed) ease-in-out;
            background-image: radial-gradient(ellipse at top, #e0e7ff 0%, var(--bg) 60%);
            overflow-x:hidden; position:relative;
        }
        body.dark { background-image: radial-gradient(ellipse at top, #1e1b4b 0%, var(--bg) 60%); }
        #particleCanvas, #starfield { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        #starfield { display:none; }
        body.dark #starfield { display:block; }
        body.dark #particleCanvas { display:none; }
        .container { width:100%; max-width:520px; z-index:1; }
        .card {
            background:var(--card); border-radius:var(--radius); padding:32px 28px;
            box-shadow:var(--shadow); border:1px solid var(--border); text-align:center;
            transition: background var(--transition-speed) ease-in-out, border-color var(--transition-speed) ease-in-out;
        }
        .card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg, var(--accent), var(--accent2));
        }
        .avatar {
            width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent2));
            display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
            font-size:36px; color:white; font-weight:700; overflow:hidden;
        }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .name { font-size:1.6rem; font-weight:700; color:var(--text); margin-bottom:4px; min-height:2rem; }
        .title-role { font-size:0.9rem; color:var(--sub); margin-bottom:16px; }
        .status-badge {
            display:inline-flex; align-items:center; gap:8px; padding:8px 20px;
            border-radius:50px; font-weight:600; font-size:1rem; margin-bottom:20px;
        }
        .status-badge.busy { background:#fef2f2; color:var(--red); border:1.5px solid #fecaca; }
        .status-badge.free { background:#ecfdf5; color:var(--green); border:1.5px solid #a7f3d0; }
        .status-badge.away { background:#fffbeb; color:#d97706; border:1.5px solid #fde68a; }
        .status-dot { width:10px; height:10px; border-radius:50%; display:inline-block; animation:pulse 1.8s infinite; }
        .busy .status-dot { background:var(--red); }
        .free .status-dot { background:var(--green); }
        .away .status-dot { background:#f59e0b; }
        @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.85); } }
        .info-grid { display:grid; gap:12px; text-align:left; margin-top:4px; }
        .info-item {
            display:flex; align-items:center; gap:12px; padding:12px 16px;
            background:var(--info-bg); border-radius:12px; font-size:0.95rem;
            transition: background var(--transition-speed) ease-in-out;
        }
        .info-item:hover { background:var(--info-hover); }
        .info-icon { font-size:1.3rem; width:28px; text-align:center; flex-shrink:0; }
        .info-label { font-size:0.75rem; color:#888; text-transform:uppercase; letter-spacing:0.5px; }
        .info-value { font-weight:600; color:var(--text); word-break:break-word; }
        .info-value a { color:var(--accent); text-decoration:none; }
        .info-value a:hover { text-decoration:underline; }

        /* Progress bar */
        .progress-widget { margin:16px 0; text-align:left; }
        .progress-label { display:flex; justify-content:space-between; font-size:0.85rem; color:var(--sub); margin-bottom:6px; }
        .progress-bar { width:100%; height:8px; background:var(--info-bg); border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:4px; transition: width 0.5s ease; }
        .diary-widget {
            background:var(--info-bg); border-radius:12px; padding:14px; margin:16px 0;
            text-align:left; border:1px solid var(--border);
        }
        .diary-widget .diary-icon { font-size:1.2rem; }
        .diary-text { margin-top:4px; color:var(--text); font-style:italic; }
        .countdown-widget {
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f2f5 100%);
            border-radius:16px; padding:16px; margin:16px 0; text-align:center; border:1px solid #dde4ff;
        }
        body.dark .countdown-widget { background: linear-gradient(135deg, #1e1b4b 0%, #1f2937 100%); border-color:#374151; }
        .countdown-title { font-weight:600; font-size:0.9rem; color:var(--accent); margin-bottom:6px; }
        .countdown-timer { font-size:1.4rem; font-weight:700; color:var(--text); }
        .discord-widget {
            background:var(--info-bg); border-radius:12px; padding:14px; margin:16px 0;
            display:flex; align-items:center; gap:12px; border:1px solid var(--border);
        }
        .discord-avatar { width:48px; height:48px; border-radius:50%; }
        .discord-username { font-weight:600; color:var(--text); }
        .discord-status { font-size:0.8rem; color:var(--sub); }
        .share-buttons { display:flex; gap:10px; justify-content:center; margin-top:20px; }
        .share-btn {
            background:var(--info-bg); border:1px solid var(--border); border-radius:10px;
            padding:8px 16px; font-size:0.9rem; cursor:pointer; color:var(--text);
        }
        .share-btn:hover { background:var(--info-hover); transform: translateY(-1px); }
        .last-updated { font-size:0.75rem; color:#aaa; margin-top:16px; }
        .admin-link { display:block; margin-top:20px; font-size:0.8rem; color:#bbb; text-decoration:none; }
        .about-link { display:block; margin-top:8px; font-size:0.8rem; color:#bbb; text-decoration:none; }
        .dark-toggle {
            position:fixed; top:20px; right:20px; width:60px; height:60px;
            background:var(--toggle-bg); border-radius:50%; box-shadow:0 0 25px var(--toggle-shadow);
            cursor:pointer; z-index:100; transition: all var(--transition-speed) cubic-bezier(0.4,0,0.2,1);
            display:flex; align-items:center; justify-content:center; overflow:hidden;
        }
        .dark-toggle .rays {
            position:absolute; width:100%; height:100%;
            background: conic-gradient(from 0deg, transparent 0deg, transparent 10deg, rgba(255,255,255,0.4) 10deg, rgba(255,255,255,0.4) 20deg);
            mask: radial-gradient(farthest-side, transparent 70%, black 71%); animation:spinRays 12s linear infinite;
        }
        @keyframes spinRays { to { transform:rotate(360deg); } }
        body.dark .dark-toggle { background:#e2e8f0; box-shadow:0 0 35px rgba(147,197,253,1); }
        body.dark .dark-toggle .rays { display:none; }
        body.dark .dark-toggle::after {
            content:''; position:absolute; width:48px; height:48px; background:#1f2937;
            border-radius:50%; top:6px; left:22px; box-shadow:0 0 8px #1f2937;
            transition: all var(--transition-speed) cubic-bezier(0.4,0,0.2,1);
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <canvas id="starfield"></canvas>

    <div class="dark-toggle" id="darkToggle"><div class="rays"></div></div>

    <div class="container">
        <div class="card">
            <div class="avatar" id="avatarContainer">
                <span id="avatarInitial">?</span>
                <img id="avatarImg" src="" style="display:none;">
            </div>
            <div class="name" id="displayName"></div>
            <div class="title-role" id="displayRole"></div>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText"></span>
            </div>

            <!-- Nhật ký -->
            <div class="diary-widget" id="diaryWidget" style="display:none;">
                <div class="diary-icon">📝</div>
                <div class="diary-text" id="diaryText"></div>
            </div>

            <!-- Tiến trình tự động -->
            <div class="progress-widget" id="progressWidget" style="display:none;">
                <div class="progress-label">
                    <span id="progressLabel"></span>
                    <span id="progressPercent"></span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>

            <div class="countdown-widget" id="countdownWidget" style="display:none;">
                <div class="countdown-title" id="countdownTitle"></div>
                <div class="countdown-timer" id="countdownTimer"></div>
            </div>

            <div class="info-grid" id="infoGrid"></div>

            <div class="discord-widget" id="discordWidget" style="display:none;">
                <img class="discord-avatar" id="discordAvatar" src="">
                <div class="discord-info">
                    <div class="discord-username" id="discordUsername"></div>
                    <div class="discord-status" id="discordStatus"></div>
                    <div class="discord-custom-status" id="discordCustomStatus"></div>
                </div>
            </div>

            <div class="last-updated" id="lastUpdated"></div>

            <div class="share-buttons">
                <button class="share-btn" onclick="shareFacebook()">📘 Facebook</button>
                <button class="share-btn" onclick="shareTwitter()">🐦 Twitter</button>
                <button class="share-btn" onclick="copyLink()">🔗 Copy link</button>
            </div>
        </div>
        <a href="/admin" class="admin-link">⚙️ Quản trị</a>
        <a href="/about" class="about-link">📖 Về tôi</a>
    </div>

    <script>
        (function() {
            const body = document.body;
            const darkToggle = document.getElementById('darkToggle');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedDark = localStorage.getItem('darkMode');
            if (savedDark === 'enabled' || (!savedDark && prefersDark)) body.classList.add('dark');
            darkToggle.addEventListener('click', () => {
                body.classList.toggle('dark');
                localStorage.setItem('darkMode', body.classList.contains('dark') ? 'enabled' : 'disabled');
            });

            // ===== PARTICLES & STARS (giữ nguyên) =====
            const particleCanvas = document.getElementById('particleCanvas');
            const starCanvas = document.getElementById('starfield');
            const pCtx = particleCanvas.getContext('2d');
            const sCtx = starCanvas.getContext('2d');
            let particles = [], stars = [];

            function resizeCanvases() {
                particleCanvas.width = starCanvas.width = window.innerWidth;
                particleCanvas.height = starCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvases);
            resizeCanvases();

            class Particle {
                constructor() {
                    this.x = Math.random() * particleCanvas.width;
                    this.y = Math.random() * particleCanvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.6 + 0.2;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > particleCanvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > particleCanvas.height) this.speedY *= -1;
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(250, 204, 21, ${this.opacity})`;
                    ctx.shadowColor = 'rgba(250,204,21,0.8)';
                    ctx.shadowBlur = 4;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            function initParticles(count = 100) {
                particles = [];
                for (let i = 0; i < count; i++) particles.push(new Particle());
            }
            function animateParticles() {
                if (body.classList.contains('dark')) {
                    pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
                    requestAnimationFrame(animateParticles);
                    return;
                }
                pCtx.clearRect(0,0,particleCanvas.width,particleCanvas.height);
                particles.forEach(p => { p.update(); p.draw(pCtx); });
                requestAnimationFrame(animateParticles);
            }

            class ShootingStar {
                constructor() { this.reset(true); }
                reset(initial = false) {
                    if (Math.random() < 0.5) { this.x = Math.random() * starCanvas.width; this.y = -20; }
                    else { this.x = -20; this.y = Math.random() * starCanvas.height * 0.5; }
                    this.len = Math.random() * 140 + 80;
                    this.speed = 4 + Math.random() * 5;
                    this.opacity = Math.random() * 0.6 + 0.6;
                    this.angle = 25 + Math.random() * 25;
                    this.curve = (Math.random() - 0.5) * 0.8;
                    this.time = 0;
                    if (initial) { this.x = Math.random() * starCanvas.width; this.y = Math.random() * starCanvas.height * 0.6; }
                }
                update() {
                    this.time += 0.02;
                    let rad = (this.angle + Math.sin(this.time) * this.curve) * Math.PI / 180;
                    this.x += this.speed * Math.cos(rad);
                    this.y += this.speed * Math.sin(rad);
                    if (this.x > starCanvas.width + 120 || this.y > starCanvas.height + 120 || this.x < -120) this.reset();
                }
                draw(ctx) {
                    let rad = (this.angle + Math.sin(this.time) * this.curve) * Math.PI / 180;
                    const endX = this.x - this.len * Math.cos(rad);
                    const endY = this.y - this.len * Math.sin(rad);
                    const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                    gradient.addColorStop(0.2, `rgba(255, 255, 240, ${this.opacity * 0.9})`);
                    gradient.addColorStop(0.6, `rgba(200, 220, 255, ${this.opacity * 0.4})`);
                    gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(endX, endY);
                    ctx.strokeStyle = gradient; ctx.lineWidth = 3.5;
                    ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 14; ctx.stroke(); ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 3.5, 0, Math.PI*2);
                    const headGradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 3.5);
                    headGradient.addColorStop(0, 'white'); headGradient.addColorStop(0.5, 'rgba(255, 255, 200, 0.9)'); headGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = headGradient; ctx.shadowColor = 'white'; ctx.shadowBlur = 18; ctx.fill(); ctx.shadowBlur = 0;
                    for (let i = 0; i < 3; i++) {
                        const sparkX = this.x + (Math.random() - 0.5) * 20, sparkY = this.y + (Math.random() - 0.5) * 20;
                        ctx.beginPath(); ctx.arc(sparkX, sparkY, Math.random() * 1.5 + 0.5, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.7 + 0.3})`; ctx.fill();
                    }
                }
            }
            function initStars(count = 6) {
                stars = [];
                for (let i = 0; i < count; i++) stars.push(new ShootingStar());
            }
            function animateStars() {
                if (!body.classList.contains('dark')) {
                    sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
                    requestAnimationFrame(animateStars);
                    return;
                }
                sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
                stars.forEach(s => { s.update(); s.draw(sCtx); });
                requestAnimationFrame(animateStars);
            }

            initParticles(100);
            initStars(6);
            animateParticles();
            animateStars();

            // ===== ĐA NGÔN NGỮ =====
            const lang = {
                vi: {
                    lastUpdated: 'Cập nhật lần cuối:',
                    diary: 'Nhật ký',
                    progressLabel: 'Tiến độ',
                    free: '🟢 Rảnh rỗi',
                    busy: '🔴 Đang bận',
                    away: '🟡 Tạm vắng',
                },
                en: {
                    lastUpdated: 'Last updated:',
                    diary: 'Diary',
                    progressLabel: 'Progress',
                    free: '🟢 Free',
                    busy: '🔴 Busy',
                    away: '🟡 Away',
                }
            };

            const API_BASE = '/api/status';
            let currentName = '';

            function calculateAge(birthday) {
                if (!birthday) return null;
                const birthDate = new Date(birthday);
                if (isNaN(birthDate.getTime())) return null;
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const m = today.getMonth() - birthDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
                return age;
            }

            let countdownInterval = null;
            function startCountdown(eventDate) {
                const cw = document.getElementById('countdownWidget');
                const ct = document.getElementById('countdownTimer');
                if (!eventDate) { cw.style.display = 'none'; if (countdownInterval) clearInterval(countdownInterval); return; }
                const target = new Date(eventDate);
                if (isNaN(target.getTime())) return;
                cw.style.display = 'block';
                function update() {
                    const now = new Date();
                    const diff = target - now;
                    if (diff <= 0) { ct.textContent = '🎉 Đã đến!'; if (countdownInterval) clearInterval(countdownInterval); return; }
                    const d = Math.floor(diff / (1000*60*60*24));
                    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
                    const s = Math.floor((diff % (1000*60)) / 1000);
                    ct.textContent = `${d}d ${h}h ${m}m ${s}s`;
                }
                update();
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(update, 1000);
            }

            async function loadDiscord(discordId) {
                const widget = document.getElementById('discordWidget');
                if (!discordId) { widget.style.display = 'none'; return; }
                try {
                    const res = await fetch(`https://api.lanyard.rest/v1/users/${discordId}`);
                    if (!res.ok) throw new Error('Failed');
                    const json = await res.json();
                    const user = json.data;
                    document.getElementById('discordAvatar').src = `https://cdn.discordapp.com/avatars/${user.discord_id}/${user.avatar}.png`;
                    document.getElementById('discordUsername').textContent = user.username;
                    const statusMap = { online:'Online', idle:'Idle', dnd:'Do Not Disturb', offline:'Offline' };
                    const statusColor = user.discord_status;
                    document.getElementById('discordStatus').innerHTML = `<span class="online-dot ${statusColor}"></span> ${statusMap[statusColor] || statusColor}`;
                    let custom = '';
                    if (user.activities && user.activities.length > 0) {
                        const ca = user.activities.find(a => a.type === 4);
                        if (ca && ca.state) { custom = ca.state; if (ca.emoji) custom = `${ca.emoji.name} ${custom}`; }
                    }
                    document.getElementById('discordCustomStatus').textContent = custom || '';
                    widget.style.display = 'flex';
                } catch(e) { widget.style.display = 'none'; }
            }

            async function loadStatus() {
                try {
                    const res = await fetch(API_BASE);
                    if (!res.ok) throw new Error('Không thể tải');
                    const data = await res.json();
                    renderStatus(data);
                } catch (err) {
                    document.querySelector('.card').innerHTML = '<p style="padding:40px;color:#999;">⚠️ Không thể kết nối...</p>';
                }
            }

            function renderStatus(data) {
                const L = lang[data.language] || lang.vi;

                const avatarField = (data.fields||[]).find(f => f.key==='avatar' && f.value);
                if (avatarField) {
                    document.getElementById('avatarImg').src = avatarField.value;
                    document.getElementById('avatarImg').style.display = 'block';
                    document.getElementById('avatarInitial').style.display = 'none';
                } else {
                    document.getElementById('avatarImg').style.display = 'none';
                    document.getElementById('avatarInitial').style.display = 'block';
                    document.getElementById('avatarInitial').textContent = (data.name||'?').charAt(0).toUpperCase();
                }

                const nameEl = document.getElementById('displayName');
                if (data.typewriterEnabled && data.name && data.name !== currentName) {
                    currentName = data.name;
                    let i = 0;
                    nameEl.textContent = '';
                    function type() {
                        if (i < data.name.length) {
                            nameEl.textContent += data.name.charAt(i);
                            i++;
                            setTimeout(type, data.typewriterSpeed || 80);
                        }
                    }
                    type();
                } else if (!data.typewriterEnabled || !data.name) {
                    nameEl.textContent = data.name || '';
                }

                document.getElementById('displayRole').textContent = data.role || '';

                const status = data.status || 'free';
                const badge = document.getElementById('statusBadge');
                badge.className = 'status-badge ' + status;
                document.getElementById('statusText').textContent = L[status] || '...';

                const diaryWidget = document.getElementById('diaryWidget');
                if (data.diary) {
                    diaryWidget.style.display = 'block';
                    document.getElementById('diaryText').textContent = data.diary;
                } else diaryWidget.style.display = 'none';

                const progressWidget = document.getElementById('progressWidget');
                const countdownField = (data.fields||[]).find(f => f.key==='countdownDate');
                if (countdownField && countdownField.value && data.progressStartDate) {
                    const start = new Date(data.progressStartDate);
                    const end = new Date(countdownField.value);
                    const now = new Date();
                    if (start < end && now >= start) {
                        const total = end - start;
                        const elapsed = now - start;
                        let percent = Math.min(100, Math.floor((elapsed / total) * 100));
                        progressWidget.style.display = 'block';
                        document.getElementById('progressLabel').textContent = L.progressLabel;
                        document.getElementById('progressPercent').textContent = percent + '%';
                        document.getElementById('progressFill').style.width = percent + '%';
                    } else progressWidget.style.display = 'none';
                } else progressWidget.style.display = 'none';

                const ceName = (data.fields||[]).find(f=>f.key==='countdownEvent');
                const ceDate = (data.fields||[]).find(f=>f.key==='countdownDate');
                document.getElementById('countdownTitle').textContent = ceName?.value || '';
                startCountdown(ceDate?.value || null);

                const grid = document.getElementById('infoGrid');
                grid.innerHTML = '';
                const fields = data.fields || [];
                let discordId = null;

                // Cập nhật icon map với các icon độc đáo
                const iconMap = {
                    age: '🎂', phone: '📱', email: '📧', location: '📍',
                    website: '🌐', github: '💻', facebook: '👤', zalo: '💬',
                    telegram: '✈️', linkedin: '💼', instagram: '📷', twitter: '🐦',
                    birthday: '🎈', avatar: '🖼️', countdownEvent: '⏳', countdownDate: '⏳',
                    discord_id: '🎮', default: '📌'
                };

                // Định nghĩa các trường đặc biệt cần xử lý link
                const linkMap = {
                    email: (v) => `mailto:${v}`,
                    website: (v) => v,
                    github: (v) => `https://github.com/TheAbadon`,
                    facebook: (v) => `https://www.facebook.com/nguyen.uc.bao.48593`,
                    linkedin: (v) => v,
                    instagram: (v) => v,
                    twitter: (v) => v,
                };

                fields.forEach(f => {
                    if (!f.value || f.value.trim()==='') return;
                    if (f.key==='discord_id') { discordId = f.value; return; }
                    if (['avatar','countdownEvent','countdownDate','progressEvent','progressPercent'].includes(f.key)) return;

                    const icon = iconMap[f.key] || iconMap['default'];
                    let displayValue = f.value;
                    let displayLabel = f.label;

                    // Xử lý hiển thị đặc biệt cho Github và Facebook
                    if (f.key === 'github') {
                        displayLabel = 'GitHub';
                        displayValue = 'TheAbadon';
                    } else if (f.key === 'facebook') {
                        displayLabel = 'Facebook';
                        displayValue = 'Nguyễn Đức Bảo';
                    } else if (f.key === 'birthday') {
                        const age = calculateAge(f.value);
                        if (age !== null) displayValue = `${f.value} (${age} tuổi)`;
                    }

                    let valueHtml = displayValue;
                    if (linkMap[f.key]) {
                        let href = linkMap[f.key](f.value);
                        valueHtml = `<a href="${href}" target="_blank" rel="noopener noreferrer">${displayValue}</a>`;
                    }

                    const div = document.createElement('div');
                    div.className = 'info-item';
                    div.innerHTML = `
                        <span class="info-icon">${icon}</span>
                        <div>
                            <div class="info-label">${displayLabel}</div>
                            <div class="info-value">${valueHtml}</div>
                        </div>
                    `;
                    grid.appendChild(div);
                });

                if (discordId) loadDiscord(discordId);

                const updated = data.updatedAt ? new Date(data.updatedAt) : null;
                document.getElementById('lastUpdated').textContent = updated ? `${L.lastUpdated} ${updated.toLocaleString('vi-VN')}` : '';
            }

            function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank', 'width=600,height=400'); }
            function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(document.title)}&url=${encodeURIComponent(window.location.href)}`, '_blank', 'width=600,height=400'); }
            function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => alert('Đã sao chép link!')).catch(() => prompt('Copy link này:', window.location.href)); }

            loadStatus();
            setInterval(loadStatus, 30000);
        })();
    </script>
</body>
</html>
